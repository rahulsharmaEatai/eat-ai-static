<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eat.AI - Voice Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top right, #1a0d05, #000);
  color: #fff;
}

/* 🔥 HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 30px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo {
  display:flex;
  align-items:center;
  gap:10px;
  font-size:18px;
  font-weight:600;
}

.logo-icon {
  background:#ff6a00;
  padding:8px 10px;
  border-radius:8px;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.sub {
  color: #aaa;
  margin-bottom: 30px;
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 20px;
}

textarea {
  width: 100%;
  height: 180px;
  background: transparent;
  border: none;
  color: #fff;
  font-size: 16px;
  outline: none;
}

.row {
  display: flex;
  gap: 15px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.select {
  flex: 1;
  background: #0d0d0d;
  border: 1px solid #222;
  border-radius: 12px;
  padding: 12px;
  color: #fff;
}

.slider {
  width: 100%;
  margin-top: 20px;
}

.btn {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  background: linear-gradient(90deg, #ff7a00, #ff3d00);
  border: none;
  color: white;
  font-weight: 600;
  cursor: pointer;
}

.audio-box {
  margin-top: 20px;
  display: none;
}

audio {
  width: 100%;
}
</style>
</head>

<body>

<!-- 🔥 HEADER FIXED -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    Eat.AI
  </div>

  <div style="font-size:13px;color:#aaa;">
    v1.0 • Voice Studio
  </div>
</div>

<div class="container">

  <h1>Speech Synthesis</h1>
  <div class="sub">
  Generate lifelike speech using our most advanced neural models. 
  Perfect for narration, storytelling, and professional voiceovers.
</div>

  <div class="card">

    <textarea id="text" placeholder="यहाँ हिंदी टेक्स्ट लिखें..."></textarea>

    <div class="row">
      <select class="select" id="voice">
        <option value="male">Aarav (Male)</option>
        <option value="female">Ananya (Female)</option>
      </select>

      <select class="select" id="style">
        <option>News Reading</option>
        <option>Storytelling</option>
        <option>Casual</option>
      </select>
    </div>

    <input type="range" min="0.5" max="2" step="0.1" value="1" class="slider" id="speed">

    <button class="btn" onclick="generate()">Generate Voice</button>

    <div class="audio-box" id="audioBox">
      <audio controls id="audio"></audio>
    </div>

  </div>

</div>

<script>
function generate() {
  const text = document.getElementById("text").value;
  const speed = document.getElementById("speed").value;

  if (!text) {
    alert("Text likho pehle");
    return;
  }

  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "hi-IN";
  speech.rate = speed;

  speechSynthesis.speak(speech);

  document.getElementById("audioBox").style.display = "block";
}
</script>

</body>
</html>
